<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider Change</title>
</head>

<style>
    body{
        background-color:black;
        font-size:20px;
        height:2000px;
        margin:0;
    }

    div#image_container{
        width:100%;
        height:100%;
        position:fixed;
        top:80px;
        left:0;
    }

    img{
        width:100%;
        height:auto;
        position:absolute;
        top:0;
        left:0;
    }

    #img1{
        z-index:1;
        opacity:1;
    }

    #img2{
        z-index:2;
        opacity:0;
    }

    #img3{
        z-index:3;
        opacity:0;
    }

    #myText{
        color:aliceblue;
        top:80px;
        display:grid;
        width:200px;
        height:1000px;
        grid-template-rows:100%;
        background-color:rgb(35,95,95,.5);
        position:absolute;
        right:0%;
        margin-left:50%;
        z-index:10;
    }

    #yAfter{
        background-color:rgb(35,95,95,.5);
    }

    #myP{
        top:0;
        position:fixed;
        color:aliceblue;
        left:10px;
        z-index:10;
    }

    h3{
        color:white;
        position:fixed;
        font-size:20px;
        top:30px;
        left:10px;
        z-index:10;
    }
</style>

<body>

<h3 id="h3scroll">The onscroll Event</h3><br>

<p id="myP" style="position:fixed">
Scroll to see changes in Lake Erie's algal growth
</p><br>

<div id="image_container">
    <img id="img1" src="./images/maumeeBay2004.png" alt="">
    <img id="img2" src="./images/maumeeBay2011.png" alt="">
    <img id="img3" src="./images/maumeeBay2023.png" alt="">
</div>

<div id="myText">

<div id="yBefore">
    <h1>2004</h1>
    <p>2004.</p>
</div>

<div id="yAfter">
    <h1>2023</h1>
    <p>2023.</p>
</div>

</div>

<script>

var maxY = document.documentElement.scrollHeight - document.documentElement.clientHeight

window.onscroll = function() {myFunction()};

function myFunction() {

    var opacity = window.scrollY / maxY

    if(opacity <= .5){ document.getElementById('img2').style.opacity = opacity * 2
        document.getElementById('img3').style.opacity = 0
    }
    else{ document.getElementById('img2').style.opacity = 1 
    document.getElementById('img3').style.opacity = (opacity - .5) * 2
    }

    document.getElementById("h3scroll").innerText = " MaxY = " + maxY + " Scroll Y = " + window.scrollY + " Scroll Y / Max Y = " + (window.scrollY/maxY).toFixed(2)
}

</script>

</body>
</html>
