<!DOCTYPE html>
<html>
<head>
    <title>Copenhagen</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

   
    <script src="./vikingShip.js"></script>

    <style>
        #mapid {
            width: 900px;
            height: 500px;
        }
    </style>
</head>

<body>
<div id="mapid"></div>

<script>
    var map = L.map('mapid').setView([55.6761, 12.5683], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    L.marker([55.71302, 12.58982])
        .addTo(map)
        .bindPopup('Nordhavn: A small harbor city in Copenhagen, DK known for its walkability and industrial design');

    var vikingIcon = L.icon({
        iconUrl: 'https://www.clipartmax.com/png/small/328-3288270_clip-art-transparent-download-viking-boat-ship-viking-boat-clip-art.png',
        iconSize: [50, 50],
        iconAnchor: [0, 0],
        popupAnchor: [0, -25]
       
    });

    var customPopup = `
        <img
          src="https://ichef.bbci.co.uk/images/ic/1920xn/p0k23sj6.jpg.webp"
          style="width:200px;"
        >
    `;
    L.geoJSON(vikingShip, {
        pointToLayer: function (feature, latlng) {
            return L.marker(latlng, { icon: vikingIcon });
        }
    })
    .bindPopup(customPopup)
    .addTo(map);
</script>

</body>
</html>
